name: Deploy Supabase migrations

# Applies supabase/migrations/*.sql to the linked Supabase project.
# Runs only when migration files change (or manually). The frontend deploy in
# deploy.yml is independent — a bad migration won't block a site deploy, and
# vice versa.
on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-migrations.yml'
  workflow_dispatch:

concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      # Sensitive — add under Settings → Secrets and variables → Actions → Secrets.
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      # Public — reuses the existing VITE_SUPABASE_URL repo Variable to find the
      # project ref (https://<ref>.supabase.co), so no extra config is needed.
      SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
    steps:
      - name: Check required config
        run: |
          missing=
          [ -n "$SUPABASE_URL" ] || missing="$missing VITE_SUPABASE_URL(variable)"
          [ -n "$SUPABASE_ACCESS_TOKEN" ] || missing="$missing SUPABASE_ACCESS_TOKEN(secret)"
          [ -n "$SUPABASE_DB_PASSWORD" ] || missing="$missing SUPABASE_DB_PASSWORD(secret)"
          if [ -n "$missing" ]; then
            echo "::error::Missing required config:$missing — see docs/SETUP-SUPABASE.md"
            exit 1
          fi

      - name: Derive project ref
        run: |
          ref=$(printf '%s' "$SUPABASE_URL" | sed -E 's#^https?://([^.]+)\..*#\1#')
          if [ -z "$ref" ] || [ "$ref" = "$SUPABASE_URL" ]; then
            echo "::error::Could not parse project ref from VITE_SUPABASE_URL='$SUPABASE_URL'"
            exit 1
          fi
          echo "PROJECT_REF=$ref" >> "$GITHUB_ENV"
          echo "Project ref: $ref"

      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Push migrations
        run: supabase db push
